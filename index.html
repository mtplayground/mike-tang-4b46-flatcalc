<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="calculator.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="calculator-shell" aria-labelledby="calculator-title">
        <h1 id="calculator-title">Calculator</h1>
        <output
          class="calculator-display"
          id="calculator-display"
          aria-live="polite"
          aria-label="Current value"
        >0</output>
        <div class="calculator-keypad" role="group" aria-label="Calculator controls">
          <button class="calculator-key calculator-key--wide" type="button" data-action="clear">C</button>
          <button class="calculator-key" type="button" data-action="operator" data-operator="divide" data-value="/" aria-label="Divide">÷</button>
          <button class="calculator-key" type="button" data-action="operator" data-operator="multiply" data-value="*" aria-label="Multiply">×</button>

          <button class="calculator-key" type="button" data-action="digit" data-value="7">7</button>
          <button class="calculator-key" type="button" data-action="digit" data-value="8">8</button>
          <button class="calculator-key" type="button" data-action="digit" data-value="9">9</button>
          <button class="calculator-key" type="button" data-action="operator" data-operator="subtract" data-value="-" aria-label="Subtract">−</button>

          <button class="calculator-key" type="button" data-action="digit" data-value="4">4</button>
          <button class="calculator-key" type="button" data-action="digit" data-value="5">5</button>
          <button class="calculator-key" type="button" data-action="digit" data-value="6">6</button>
          <button class="calculator-key" type="button" data-action="operator" data-operator="add" data-value="+" aria-label="Add">+</button>

          <button class="calculator-key" type="button" data-action="digit" data-value="1">1</button>
          <button class="calculator-key" type="button" data-action="digit" data-value="2">2</button>
          <button class="calculator-key" type="button" data-action="digit" data-value="3">3</button>
          <button class="calculator-key calculator-key--tall" type="button" data-action="equals" aria-label="Equals">=</button>

          <button class="calculator-key calculator-key--wide" type="button" data-action="digit" data-value="0">0</button>
          <button class="calculator-key" type="button" data-action="decimal" data-value=".">.</button>
        </div>
      </section>
    </main>
  </body>
</html>
